name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Placeholder URL — only needed so Prisma Client and Next.js can build; no DB connection is made.
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ci_build
          AUTH_SECRET: ci-build-secret-must-be-at-least-32-chars-long
